<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>💕 Waiting for You 💕</h1>
    <p class="subtitle">Every second brings you closer, Shalini! Counting down until I can finally hold you again. ✈️❤️</p>
    <div class="progress-section">
      <img src="assets/girl.jpg" class="character girl-photo" id="girl-img" alt="Girl">
      <div class="progress-middle">
        <div class="flight-wrap">
          <img src="assets/flight.svg" class="flight" id="flight-img" alt="Flight">
        </div>
        <div class="timer-bar-bg">
          <div class="timer-bar-fill" id="timer-bar"></div>
        </div>
      </div>
      <img src="assets/guy.jpg" class="character guy-photo" id="guy-img" alt="Guy">
    </div>
    <div class="timer-bar-container">
      <div class="countdown romantic-countdown" id="countdown">
        <div class="time-unit">
          <span class="number" id="days">00</span>
          <span class="label">Days</span>
        </div>
        <div class="time-unit">
          <span class="number" id="hours">00</span>
          <span class="label">Hours</span>
        </div>
        <div class="time-unit">
          <span class="number" id="minutes">00</span>
          <span class="label">Minutes</span>
        </div>
        <div class="time-unit">
          <span class="number" id="seconds">00</span>
          <span class="label">Seconds</span>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
